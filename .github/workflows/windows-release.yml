name: Windows Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: huiyun-ai-video-windows-release
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    timeout-minutes: 60
    env:
      RELEASE_REPO: luojiang419/huiyun-ai-video-releases
      RELEASES_REPO_TOKEN: ${{ secrets.RELEASES_REPO_TOKEN }}
      PROJECT_DIR: flutter_grsai_video_gen
      ARTIFACT_DIR: release-artifacts
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Require cross-repository release token
        shell: pwsh
        run: |
          if ([string]::IsNullOrWhiteSpace($env:RELEASES_REPO_TOKEN)) {
            throw 'Repository secret RELEASES_REPO_TOKEN is required.'
          }

      - name: Test version resolver
        shell: pwsh
        run: ./scripts/resolve_release_version.ps1 -SelfTest

      - name: Resolve release version
        id: version
        shell: pwsh
        run: |
          ./scripts/resolve_release_version.ps1 `
            -Repo $env:RELEASE_REPO `
            -MinimumVersion V10.0.1 `
            -SourceSha '${{ github.sha }}'

      - name: Install pinned Flutter
        if: steps.version.outputs.skip != 'true'
        shell: pwsh
        run: |
          $flutterRoot = Join-Path $env:RUNNER_TEMP 'flutter-3.38.8'
          git clone --branch 3.38.8 --depth 1 https://github.com/flutter/flutter.git $flutterRoot
          $revision = (git -C $flutterRoot rev-parse HEAD).Trim()
          if ($revision -ne 'bd7a4a6b5576630823ca344e3e684c53aa1a0f46') {
            throw "Unexpected Flutter revision: $revision"
          }
          (Join-Path $flutterRoot 'bin') | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Install pinned Inno Setup
        if: steps.version.outputs.skip != 'true'
        shell: pwsh
        run: choco install innosetup --version=6.7.1 --no-progress -y

      - name: Run project tests
        if: steps.version.outputs.skip != 'true'
        working-directory: flutter_grsai_video_gen
        shell: pwsh
        run: |
          flutter pub get
          flutter analyze --no-fatal-infos --no-fatal-warnings
          flutter test

      - name: Build Windows installer
        if: steps.version.outputs.skip != 'true'
        id: build
        shell: pwsh
        run: |
          ./scripts/build_windows_release.ps1 `
            -Version '${{ steps.version.outputs.version }}' `
            -ProjectDir $env:PROJECT_DIR `
            -ArtifactDir $env:ARTIFACT_DIR

      - name: Verify installer and create manifest
        if: steps.version.outputs.skip != 'true'
        id: verify
        shell: pwsh
        run: |
          ./scripts/verify_release_artifact.ps1 `
            -Version '${{ steps.version.outputs.version }}' `
            -InstallerPath '${{ steps.build.outputs.installer }}' `
            -SourceSha '${{ github.sha }}' `
            -Repo $env:RELEASE_REPO `
            -ReleaseNotes '图片生成比例下拉选项新增 4:5，并修复 Z-Image 对应竖版分辨率传参。'

      - name: Publish transactionally and verify Latest
        if: steps.version.outputs.skip != 'true'
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.RELEASES_REPO_TOKEN }}
        run: |
          ./scripts/publish_release.ps1 `
            -Version '${{ steps.version.outputs.version }}' `
            -InstallerPath '${{ steps.build.outputs.installer }}' `
            -ManifestPath '${{ steps.verify.outputs.manifest }}' `
            -ChecksumPath '${{ steps.verify.outputs.checksum }}' `
            -NotesPath '${{ steps.verify.outputs.notes }}' `
            -SourceSha '${{ github.sha }}' `
            -Repo $env:RELEASE_REPO `
            -SourceRepoRoot '.'

      - name: Upload validated installer for diagnostics
        if: steps.version.outputs.skip != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: HuiYunAI-${{ steps.version.outputs.version }}-windows-x64
          path: release-artifacts/
          if-no-files-found: error
          retention-days: 7
